<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>PAINEL DV</title>

  <style>

:root{
  --bg:#f1f5f9;
  --card:#ffffff;
  --primary:#2563eb;
  --success:#16a34a;
  --danger:#ef4444;
  --warning:#f59e0b;
  --dark:#0f172a;
  --text:#0f172a;
  --sub:#64748b;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
}

/* ================= HEADER ================= */
header{
  background:var(--dark);
  color:#fff;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:10;
}

header div:first-child{
  font-size:18px;
  font-weight:800;
  letter-spacing:0.5px;
}

#status{
  font-size:12px;
  opacity:0.7;
}

/* ================= CONTROLS ================= */
.controls{
  padding:15px;
  background:#fff;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  border-bottom:1px solid #e5e7eb;
}

input,button{
  padding:10px 12px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  font-size:13px;
}

button{
  background:var(--primary);
  color:#fff;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  opacity:0.9;
}

/* ================= KPI ================= */
#kpis{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:15px;
}

.kpi{
  background:linear-gradient(180deg,#fff,#f8fafc);
  border-radius:14px;
  padding:18px;
  box-shadow:0 8px 25px rgba(0,0,0,0.06);
}

.kpi .label{
  font-size:12px;
  color:var(--sub);
}

.kpi .value{
  font-size:22px;
  font-weight:800;
  margin-top:5px;
}

/* ================= GRID ================= */
.grid{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:20px;
  padding:20px;
}

/* ================= CARD ================= */
.card{
  background:linear-gradient(180deg,#ffffff,#f8fafc);
  border-radius:16px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  transition:all 0.2s ease;
  position:relative;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 20px 40px rgba(0,0,0,0.12);
}

.empresa{
  font-size:13px;
  color:var(--sub);
  font-weight:700;
  margin-bottom:6px;
}

.valor{
  font-size:30px;
  font-weight:800;
  color:var(--success);
  transition:0.3s;
}

/* ================= LISTA ================= */
.item{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin-top:4px;
  border-bottom:1px dashed #e5e7eb;
  padding-bottom:2px;
}

/* ================= METAS ================= */
.metas{
  display:flex;
  gap:20px;
  margin-top:12px;
}

.bola{
  width:70px;
  height:70px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}
.conteudo-bola{
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-size:13px;
  font-weight:800;
  text-align:center;
}

.conteudo-bola small{
  font-size:9px;
  font-weight:600;
  margin-top:2px;
}

    
.bola::before{
  content:"";
  position:absolute;
  width:52px;
  height:52px;
  background:#fff;
  border-radius:50%;
}
.bola span{
  position:relative;
  z-index:2;
}

/* PRATA */
.prata{
  background:conic-gradient(#2563eb var(--p), #e5e7eb 0);
}

/* OURO */
.ouro{
  background:conic-gradient(#eab308 var(--p), #e5e7eb 0);
}

/* ================= BADGES ================= */
.badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:6px;
  font-size:11px;
  font-weight:700;
  margin-top:6px;
}

.badge-success{
  background:#dcfce7;
  color:#166534;
}

.badge-danger{
  background:#fee2e2;
  color:#991b1b;
}

.badge-warning{
  background:#fef3c7;
  color:#92400e;
}

/* ================= BOXES ================= */
.box{
  margin-top:8px;
  padding:10px;
  border-radius:10px;
  font-size:12px;
}

.box-gray{
  background:#f1f5f9;
}

.box-dark{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* ================= LOADING ================= */
#loading{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  z-index:999;
}




.status-dot{
  width:12px;
  height:12px;
  border-radius:50%;
  background:#22c55e;
  position:fixed;
  top:15px;
  right:15px;
  box-shadow:0 0 10px #22c55e;
  z-index:999;
  transition:0.3s;
}
.status-dot.loading{
  background:#f59e0b;
  box-shadow:0 0 10px #f59e0b;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{ transform:scale(1); opacity:1 }
  50%{ transform:scale(1.3); opacity:0.5 }
  100%{ transform:scale(1); opacity:1 }
}


.logo{
  width:50px;
  height:50px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #e5e7eb;
}

#popupOverlay{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  align-items:center;
  justify-content:center;
  z-index:9999;
}

#popupOverlay.active{
  display:flex;
}

.loader{
  width:16px;
  height:16px;
  border:2px solid #ffffff;
  border-top:2px solid transparent;
  border-radius:50%;
  display:none;
  animation:spin 0.7s linear infinite;
}

@keyframes spin{
  from{ transform:rotate(0deg); }
  to{ transform:rotate(360deg); }
}

button.loading{
  pointer-events:none;
  opacity:0.7;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

button.loading #btnText{
  display:none;
}

button.loading #btnLoader{
  display:block;
}
</style>
</head>

function mesOperacional(){

  const now = new Date()

  const inicio = new Date(
    now.getFullYear(),
    now.getMonth(),
    1,
    4,0,0,0
  )

  const fim = new Date()

  return { inicio, fim }
}



function salvarCache(dados, dadosMes){

  const payload = {
    dados,
    dadosMes,
    atualizadoEm: new Date().toISOString()
  }

  localStorage.setItem(STORAGE_KEY, JSON.stringify(payload))

}



  function carregarCache(){

}

function lerJSONSeguro(raw){

  try{

    // já é objeto → retorna direto
    if(typeof raw === "object"){
      return raw
    }

    // não é string → inválido
    if(typeof raw !== "string"){
      return null
    }

    // 1º parse
    let parsed = JSON.parse(raw)

    // se ainda for string → parse de novo
    if(typeof parsed === "string"){
      parsed = JSON.parse(parsed)
    }

    return parsed

  }catch(e){
    console.log("❌ ERRO AO LER JSON:", e.message)
    console.log("📦 RAW PROBLEMÁTICO:", raw)
    return null
  }
}
function normalizarEmpresa(empBase, caixa){

  const nome = (empBase || "").trim().toUpperCase()

  if(nome.includes("DELICIA")) return "DELICIA"
  if(nome.includes("VILLA")) return "VILLA"
  if(nome.includes("PADARIA")) return "PADARIA"

  if(nome.includes("MERCATTO")){
    if(caixa >= 1 && caixa <= 5) return "MERCATTO EMPÓRIO"
    if(caixa >= 6) return "MERCATTO RESTAURANTE"
  }

  return nome
}



async function carregarMesBackground(dataSelecionada){

  console.log("🚀 INICIANDO BACKGROUND MÊS")

  const cache = carregarCache() || {}

  let dadosMesCache = cache.dadosMes || {}
  let ultimaPagina = cache.ultimaPaginaMes || 0

  const step = 300

  const ano = dataSelecionada.split("-")[0]
  const mesNumero = dataSelecionada.split("-")[1]

  const inicioMes = `${ano}-${mesNumero}-01`
  const fimMes = new Date(ano, Number(mesNumero), 0)
    .toISOString()
    .split("T")[0]

let dadosMesBruto = cache?.dadosMesBruto || []
if(cache.dadosMes){
  console.log("⚡ CONTINUANDO DO CACHE")
}
  
  while(true){

    const { data, error } = await sb
      .from("resumo_vendas")
      .select("*")
      .gte("data", inicioMes)
      .lte("data", fimMes)
      .eq("cancelado", false)
      .order("data", { ascending: true })
      .range(from, from + step - 1)

    if(error){
      console.log("❌ ERRO BACKGROUND:", error)
      break
    }

    if(!data || data.length === 0){
      console.log("🏁 FIM BACKGROUND")
      break
    }

    dadosMesBruto = dadosMesBruto.concat(data)

if(!window.dadosMesCache){
  window.dadosMesCache = {}
}

data.forEach(v => {

  const id = v.unique_id
  if(!id || idsProcessadosMes.has(id)) return

  idsProcessadosMes.add(id)

  const p = parse(v)
  if(!p || p.cancelado) return

const emp = normalizarEmpresa(v.empresa_id, Number(v.caixa || 0))
  if(!window.dadosMesCache[emp]){
    window.dadosMesCache[emp] = {
      total:0,
      vendas:0,
      cancelados:0,
      valorCancelado:0,
      finais:{},
      almocoTotal:0,
      almocoVendas:0
    }
  }

  const d = window.dadosMesCache[emp]

  d.total += p.valor
  d.vendas++

  const nome = p.finalizadora || "OUTROS"
  d.finais[nome] = (d.finais[nome] || 0) + p.valor

  // almoço
  const hora = new Date(p.data).getHours()
  if(hora >= 10 && hora < 15){
    d.almocoTotal += p.valor
    d.almocoVendas++
  }

})

// 🔥 ATUALIZA TELA EM TEMPO REAL
if(window.dadosCache){

}

}

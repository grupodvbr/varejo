:root{
  --bg:#020617;
  --card:#0f172a;
  --card2:#020617;
  --primary:#2563eb;
  --success:#22c55e;
  --danger:#ef4444;
  --warning:#f59e0b;
  --text:#ffffff;
  --sub:#94a3b8;
  --border:#1e293b;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

/* ================= BASE ================= */
html,body{
  width:100%;
  height:100%;
  overflow:hidden; /* 🔥 SEM SCROLL PRA TV */
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
}

/* ================= HEADER ================= */
header{
  height:50px;
  background:#020617;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
}

header div:first-child{
  font-size:13px;
  font-weight:800;
  letter-spacing:1px;
}

#status{
  font-size:11px;
  color:var(--sub);
}

/* ================= REMOVE CONTROLS ================= */
.controls,
#kpis,
#periodo{
  display:none !important;
}

/* ================= GRID FIXO TV ================= */
.grid{
  height: calc(100vh - 50px);
  display:grid;

  grid-template-columns: 1fr 2fr;
  grid-template-rows: repeat(3, 1fr);

  gap:8px;
  padding:8px;
}



  /* LINHA 1 */
#villa        { grid-column:1; grid-row:1; }

/* LINHA 2 */
#delicia      { grid-column:1; grid-row:2; }



/* LINHA 3 */
#padaria      { grid-column:1; grid-row:3; }
/* ================= CARD ================= */
.card{
  background:linear-gradient(180deg,var(--card),var(--card2));
  border-radius:14px;
  padding:6px 8px 8px 8px; /* menos espaço em cima */
  overflow:hidden; /* 🔥 IMPEDE ESTOURO */
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  box-shadow:0 15px 35px rgba(0,0,0,0.5);
  border:1px solid var(--border);
  height:100%;
    min-height:0; /* 🔥 PERMITE ENCOLHER */
}

/* ================= TOP ================= */
.card-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:4px;
}

/* ================= LOGO ================= */
.logo{
  width:38px;
  height:38px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid var(--border);

  margin-top:-2px; /* 🔥 ajuste fino */
  transform:none; /* 🔥 remove o excesso */
}
@media (min-width:1400px){
  .logo{
    margin-top:-1px;
  }
}
/* ================= VALOR ================= */
.valor{
  font-size:clamp(10px, 1.4vw, 12px);
  font-weight:800;
  color:var(--success);
  letter-spacing:0.5px;
}

/* ================= VENDAS ================= */
.vendas{
  font-size:12px;
  color:var(--sub);
  margin-top:4px;
}


/* ================= MÊS ================= */
.mes{
  margin-top:8px;
  padding:8px;
  border-radius:8px;
  background:linear-gradient(135deg,#020617,#020617);
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:clamp(10px, 1.5vw, 12px);
  border:1px solid var(--border);
}

.mes span:last-child{
  font-size:14px;
  font-weight:800;
  color:#22c55e;
}

/* ================= CANCELADOS ================= */
.cancel{
  font-size:11px;
  color:var(--danger);
  margin-top:4px;
}

/* ================= METAS ================= */
.metas{
  display:flex;
  gap:2px;
}

/* ================= METAS ================= */
.metas{
  display:flex;
  gap:6px;
}

/* BOLINHA */
.bola{
  width:36px;
  height:36px;
  border-radius:50%;
  position:relative;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:11px;
  font-weight:700;

  overflow:hidden;
}

/* FURO INTERNO (define a espessura) */
.bola::before{
  content:"";
  position:absolute;
  width:28px;
  height:28px;
  background:#020617;
  border-radius:50%;
  z-index:1;
}

/* TEXTO % */
.bola span{
  position:relative;
  z-index:2;
  font-size:11px;
  font-weight:700;
}

/* CORES */
.prata{
  background:conic-gradient(#c0c0c0 var(--p), #1e293b 0);
}

.ouro{
  background:conic-gradient(#d4af37 var(--p), #1e293b 0);
}

/* ================= TOTAL CARD ================= */
.total-card{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.total-card .titulo{
  font-size:12px;
  color:var(--sub);
}

.total-card .valor{
  font-size:34px;
}

/* ================= STATUS ================= */
.status-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#22c55e;
  position:fixed;
  top:8px;
  right:10px;
  box-shadow:0 0 8px #22c55e;
}

.status-dot.loading{
  background:#f59e0b;
  box-shadow:0 0 8px #f59e0b;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{ transform:scale(1); opacity:1 }
  50%{ transform:scale(1.3); opacity:0.5 }
  100%{ transform:scale(1); opacity:1 }
}

/* ================= POPUP ================= */
#popupOverlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
}

#popupOverlay.active{
  display:flex;
}

#popupBox{
  background:#020617;
  border-radius:14px;
  padding:20px;
  width:350px;
  max-height:80vh;
  overflow:auto;
  border:1px solid var(--border);
}

/* ================= RESPONSIVO ================= */

/* TV GRANDE */
@media (min-width:1400px){
  .valor{ font-size:32px; }
}

/* TABLET */
@media (max-width:900px){
  .grid{
    grid-template-columns:1fr;
    grid-template-rows:auto;
    overflow:auto;
  }

  html,body{
    overflow:auto;
  }

.bola span{
  font-weight:800;

.almoco{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;

  margin-top:6px;
  padding:6px;
  border-radius:8px;
  background:#020617;
  font-size:clamp(9px, 1.3vw, 11px);

#extra{

#barraResumo{

function mesOperacional(){

  const now = new Date()

  const inicio = new Date(
    now.getFullYear(),
    now.getMonth(),
    1,
    4,0,0,0
  )

  const fim = new Date()

  return { inicio, fim }
}



function salvarCache(dados, dadosMes){

  const payload = {
    dados,
    dadosMes,
    atualizadoEm: new Date().toISOString()
  }

  localStorage.setItem(STORAGE_KEY, JSON.stringify(payload))

}



  function carregarCache(){

  try{
    const raw = localStorage.getItem(STORAGE_KEY)
    if(!raw) return null

    return JSON.parse(raw)

  }catch(e){
    return null
  }

}

function lerJSONSeguro(raw){

  try{

    // já é objeto → retorna direto
    if(typeof raw === "object"){
      return raw
    }

    // não é string → inválido
    if(typeof raw !== "string"){
      return null
    }

    // 1º parse
    let parsed = JSON.parse(raw)

    // se ainda for string → parse de novo
    if(typeof parsed === "string"){
      parsed = JSON.parse(parsed)
    }

    return parsed

  }catch(e){
    console.log("❌ ERRO AO LER JSON:", e.message)
    console.log("📦 RAW PROBLEMÁTICO:", raw)
    return null
  }
}



function normalizarEmpresa(empBase, caixa){

  const nome = (empBase || "").trim().toUpperCase()

  if(nome.includes("DELICIA")) return "DELICIA"
  if(nome.includes("VILLA")) return "VILLA"
  if(nome.includes("PADARIA")) return "PADARIA"

  if(nome.includes("MERCATTO")){
    if(caixa >= 1 && caixa <= 5) return "MERCATTO EMPÓRIO"
    if(caixa >= 6) return "MERCATTO RESTAURANTE"
  }

  return nome
}

  

async function carregarMesBackground(dataSelecionada){

  console.log("🚀 INICIANDO BACKGROUND MÊS")

  const cache = carregarCache() || {}

  let dadosMesCache = cache.dadosMes || {}
  let ultimaPagina = cache.ultimaPaginaMes || 0

  const step = 300
  let from = ultimaPagina

  const ano = dataSelecionada.split("-")[0]
  const mesNumero = dataSelecionada.split("-")[1]

  const inicioMes = `${ano}-${mesNumero}-01`
  const fimMes = new Date(ano, Number(mesNumero), 0)
    .toISOString()
    .split("T")[0]

let dadosMesBruto = cache?.dadosMesBruto || []
if(cache.dadosMes){
  console.log("⚡ CONTINUANDO DO CACHE")
}
  
  while(true){

    const { data, error } = await sb
      .from("resumo_vendas")
      .select("*")
      .gte("data", inicioMes)
      .lte("data", fimMes)
      .eq("cancelado", false)
      .order("data", { ascending: true })
      .range(from, from + step - 1)

    if(error){
      console.log("❌ ERRO BACKGROUND:", error)
      break
    }

    if(!data || data.length === 0){
      console.log("🏁 FIM BACKGROUND")
      break
    }

    dadosMesBruto = dadosMesBruto.concat(data)

if(!window.dadosMesCache){
  window.dadosMesCache = {}
}

data.forEach(v => {

  const id = v.unique_id
  if(!id || idsProcessadosMes.has(id)) return

  idsProcessadosMes.add(id)

  const p = parse(v)
  if(!p || p.cancelado) return

const emp = normalizarEmpresa(v.empresa_id, Number(v.caixa || 0))
  if(!window.dadosMesCache[emp]){
    window.dadosMesCache[emp] = {
      total:0,
      vendas:0,
      cancelados:0,
      valorCancelado:0,
      finais:{},
      almocoTotal:0,
      almocoVendas:0
    }
  }

  const d = window.dadosMesCache[emp]

  d.total += p.valor
  d.vendas++

  const nome = p.finalizadora || "OUTROS"
  d.finais[nome] = (d.finais[nome] || 0) + p.valor

  // almoço
  const hora = new Date(p.data).getHours()
  if(hora >= 10 && hora < 15){
    d.almocoTotal += p.valor
    d.almocoVendas++
  }

})

// 🔥 ATUALIZA TELA EM TEMPO REAL
if(window.dadosCache){
  render(window.dadosCache, window.dadosMesCache)
}
